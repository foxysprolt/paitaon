<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Center | Rafael</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3;
            --bg: #0b0b0d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f5f5f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, #1d1d1f, #0b0b0d);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s active, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }

        #resultado {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            min-height: 60px;
            font-weight: 300;
            line-height: 1.6;
            font-size: 0.95rem;
            text-align: left;
            border-left: 4px solid var(--primary);
        }

        .label {
            color: #86868b;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>API Dashboard</h1>
    
    <div class="input-group">
        <input type="number" id="idInput" placeholder="ID do produto">
        <button onclick="buscarDados()">Buscar</button>
    </div>

    <div id="resultado">
        Aguardando consulta...
    </div>
</div>

<script>
    async function buscarDados() {
        const id = document.getElementById('idInput').value;
        const display = document.getElementById('resultado');
        
        if(!id) return;

        display.innerHTML = "Consultando motor...";

        try {
            const response = await fetch(`http://127.0.0.1:8000/imoveis/${id}`);
            const dados = await response.json();

            if (response.ok) {
                display.innerHTML = `
                    <span class="label">Imóvel</span>
                    <strong>${dados.titulo}</strong><br><br>
                    <span class="label">Preço</span>
                    <strong>R$ ${dados.valor.toLocaleString('pt-BR')}</strong>
                `;
            } else {
                display.innerHTML = `<span style="color: #ff453a">⚠️ ${dados.erro}</span>`;
            }
        } catch (error) {
            display.innerHTML = `<span style="color: #ff453a">❌ Servidor Offline</span>`;
        }
    }
</script>

</body>
</html>
